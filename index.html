<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PDF Chatbot</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
        }

        #chat {
            white-space: pre-wrap;
            border: 1px solid #ccc;
            padding: 15px;
            height: 400px;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        input {
            width: 70%;
            padding: 8px;
        }

        button {
            padding: 8px 12px;
            margin-left: 5px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        #loginScreen{

            width:300px;

            margin:80px auto;

            text-align:center;

        }

        #loginScreen input{

            width:100%;

            padding:10px;

            margin-bottom:10px;

        }

        #loginError{

            color:red;

        }
    </style>
</head>

<body>

    <div id="loginScreen">

        <h2>Internal Chatbot</h2>

        <input
            id="password"
            type="password"
            placeholder="Password">

        <button onclick="login()">
            Login
        </button>

        <p id="loginError"></p>

    </div>

    <div id="app" style="display:none;">


    <h2>📄 PDF Chatbot</h2>

    <div class="top-bar">
        <button onclick="clearChat()">🧹 Clear Chat</button>
    </div>

    <select id="areaSelect" onchange="updateMachines()"></select>

    <select id="machineSelect" onchange="updateVariants()"></select>

    <select id="variantSelect" onchange="switchManual()"></select>

    <br><br>

    <img
        id="machineImage"
        style="max-width:400px; max-height:250px;"
    >

    <div id="chat"></div>

    <input id="q" placeholder="Ask a question...">
    <button onclick="ask()">Send</button>

    <h3>Documents</h3>

    <div id="documents"></div>


    <script>
	const BACKEND_URL = "https://lehnerchatbotv02internal-production.up.railway.app";
    
        // ----------------------------
        // SESSION ID
        // ----------------------------
        let authToken =
            sessionStorage.getItem(
                "authToken"
            );

        let session_id = localStorage.getItem("session_id");

        if (!session_id) {
            session_id = crypto.randomUUID();
            localStorage.setItem("session_id", session_id);
        }

        const chatBox = document.getElementById("chat");

        let manualTree = {};


        // ----------------------------
        // ASK FUNCTION (STREAMING)
        // ----------------------------
        async function ask() {
            const area =
                document.getElementById("areaSelect").value;

            const machine =
                document.getElementById("machineSelect").value;

            const variant =
                document.getElementById("variantSelect").value;

            const manual = `${area}/${machine}/${variant}`; 

            const q = document.getElementById("q").value;
            if (!q) return;

            // Show user message
            chatBox.innerText +=
                "\n\n🧑 You: " + q +
                "\n🤖 Searching manual...\n";
            chatBox.scrollTop = chatBox.scrollHeight;
            
            const res = await fetch(`${BACKEND_URL}/ask`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    Authorization: `Bearer ${authToken}`
                },
                body: JSON.stringify({
                    question: q,
                    session_id: session_id,
                    manual: manual
                })
            });

            if(res.status===401){

                sessionStorage.removeItem("authToken");

                location.reload();

                return;

            }

            const reader = res.body.getReader();
            const decoder = new TextDecoder("utf-8");

            let done = false;
            let firstChunk = true;

            while (!done) {
                const { value, done: doneReading } = await reader.read();
                done = doneReading;

                if (value) {

                    const chunk = decoder.decode(value);

                    if (firstChunk) {

                        chatBox.innerText =
                            chatBox.innerText.replace(
                                "🤖 Searching manual...\n",
                                "🤖 Bot: "
                            );
                        firstChunk = false;
                    }

                    chatBox.innerText += chunk;

                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            }

            document.getElementById("q").value = "";
        }

        // ----------------------------
        // Load Manuals
        // ----------------------------

        async function loadManuals() {

            const res = await fetch(
                `${BACKEND_URL}/manuals`,
                {
                    headers: {
                        Authorization: `Bearer ${authToken}`
                    }
                }
            );

            if (res.status === 401) {

                sessionStorage.removeItem("authToken");

                location.reload();

                return;

            }



            manualTree = await res.json();

            const areaSelect = document.getElementById("areaSelect");

            areaSelect.innerHTML = "";

            for (const area in manualTree) {

                const option = document.createElement("option");

                option.value = area;
                option.textContent = area;

                areaSelect.appendChild(option);
            }

            updateMachines();
        }


        function updateMachines() {

            const area = document.getElementById("areaSelect").value;

            const machineSelect =
                document.getElementById("machineSelect");

            machineSelect.innerHTML = "";

            for (const machine in manualTree[area]) {

                const option = document.createElement("option");

                option.value = machine;
                option.textContent = machine;

                machineSelect.appendChild(option);
            }

            updateVariants();
        }

        function updateVariants() {

            const area =
                document.getElementById("areaSelect").value;

            const machine =
                document.getElementById("machineSelect").value;

            const variantSelect =
                document.getElementById("variantSelect");

            variantSelect.innerHTML = "";

            const variants = manualTree[area][machine];

            variants.forEach(variant => {

                const option = document.createElement("option");

                option.value = variant;
                option.textContent = variant;

                variantSelect.appendChild(option);
            });

            
            switchManual();
        }

        async function updateImage() {

            const area =
                document.getElementById("areaSelect").value;

            const machine =
                document.getElementById("machineSelect").value;

            const variant =
                document.getElementById("variantSelect").value;

            const response = await fetch(

                `${BACKEND_URL}/image/${area}/${machine}/${variant}`,

                {

                    headers:{

                        Authorization:`Bearer ${authToken}`

                    }

                }

            );

            if(response.status===401){

                sessionStorage.removeItem("authToken");

                location.reload();

                return;

            }

            const blob =
                await response.blob();

            const url =
                URL.createObjectURL(blob);

            document.getElementById(
                "machineImage"
            ).src = url;

        }


        // ----------------------------
        // Set up files for download
        // ----------------------------

        async function updateDocuments() {

            const area =
                document.getElementById("areaSelect").value;

            const machine =
                document.getElementById("machineSelect").value;

            const variant =
                document.getElementById("variantSelect").value;

            const res = await fetch(
                `${BACKEND_URL}/files/${area}/${machine}/${variant}`,
                {
                    headers:{
                        Authorization:`Bearer ${authToken}`
                    }
                }
            );

            if(res.status===401){

                sessionStorage.removeItem("authToken");

                location.reload();

                return;

            }

            const files = await res.json();

            const container =
                document.getElementById("documents");

            container.innerHTML = "";

            files.forEach(file => {

                const link = document.createElement("a");

                link.href =
                    `${BACKEND_URL}/download/${area}/${machine}/${variant}/${encodeURIComponent(file)}`;

                link.textContent = "📄 " + file;

                link.target = "_blank";

                container.appendChild(link);

                container.appendChild(
                    document.createElement("br")
                );
            });
        }


        // ----------------------------
        // CLEAR CHAT
        // ----------------------------
        function clearChat() {
            localStorage.removeItem("session_id");
            location.reload();
        }
        function switchManual() {
            session_id = crypto.randomUUID();
            localStorage.setItem("session_id", session_id);

            chatBox.innerText = "";
            updateImage();
            updateDocuments();
        }

         

        // Enter to send
        document.getElementById("q").addEventListener("keydown", function(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault(); // prevent newline / form submit
                ask();
            }
        });


        async function login(){

            const password =
                document.getElementById(
                    "password"
                ).value;

            const response =
                await fetch(
                    `${BACKEND_URL}/login`,
                    {

                        method:"POST",

                        headers:{
                            "Content-Type":"application/json"
                        },

                        body:JSON.stringify({

                            password:password

                        })

                    }
                );

            if(!response.ok){

                document.getElementById(
                    "loginError"
                ).innerText =
                    "Wrong password";

                return;

            }

            const data =
                await response.json();

            authToken =
                data.token;

            sessionStorage.setItem(
                "authToken",
                authToken
            );

            showApp();

        }

        document.getElementById("password").addEventListener(
            "keydown",
            function(event){

                if(event.key === "Enter"){

                    event.preventDefault();

                    login();

                }

            }
        );



        async function verifyToken(){

            const response = await fetch(
                `${BACKEND_URL}/verify`,
                {
                    headers:{
                        Authorization:`Bearer ${authToken}`
                    }
                }
            );


            return response.ok;
        }



        function showApp(){

            document.getElementById(
                "loginScreen"
            ).style.display="none";


            document.getElementById(
                "app"
            ).style.display="block";


            loadManuals();

        }



        async function checkLogin(){

            if(!authToken){

                return;

            }


            const valid = await verifyToken();


            if(valid){

                showApp();

            }
            else{

                sessionStorage.removeItem(
                    "authToken"
                );

                authToken = null;

            }

        }



        checkLogin();
</script>

    </div>
</body>
</html>
