<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PDF Chatbot</title>

    
    <style>

    *{
        box-sizing:border-box;
    }

    body{

        margin:0;

        font-family:
            "Segoe UI",
            Arial,
            sans-serif;

        background:#eef1f5;

        color:#1f2933;

    }


    /* ---------------- HEADER ---------------- */

    .header{

        height:72px;

        background:#ffffff;

        display:flex;

        justify-content:space-between;

        align-items:center;

        padding:0 35px;

        border-bottom:1px solid #d9dee5;

    }

    .header h1{

        margin:0;

        font-size:22px;

        font-weight:600;

        letter-spacing:.2px;

    }

    .header-buttons button{

        margin-left:10px;

    }


    /* ---------------- APP ---------------- */

    #app{

        height:calc(100vh - 70px);

    }


    /* ---------------- TOOLBAR ---------------- */

    .toolbar{

        display:flex;

        gap:12px;

        padding:18px 35px;

    }

    .toolbar select{

        min-width:240px;

        padding:11px 14px;

        font-size:15px;

        border-radius:8px;

        border:1px solid #ccd3dc;

        background:white;

    }


    /* ---------------- MAIN ---------------- */

    .main-layout{

        display:flex;

        gap:24px;

        padding:
            0 35px 25px 35px;

        height:
            calc(100% - 130px);

    }


    /* ---------------- LEFT PANEL ---------------- */

    .left-panel{

        width:340px;

        display:flex;

        flex-direction:column;

        gap:18px;

    }


    /* ---------------- CARD ---------------- */

    .card{

        background:white;

        border-radius:14px;

        border:1px solid #e1e5ea;

        padding:22px;

    }


    /* ---------------- IMAGE ---------------- */

    #machineImage{

        width:100%;

        height:230px;

        object-fit:contain;

    }


    /* ---------------- DOCUMENTS ---------------- */

    #documents{

        display:flex;

        flex-direction:column;

        gap:10px;

    }

    #documents a{

        text-decoration:none;

    }


    /* ---------------- CHAT ---------------- */

    .chat-panel{

        flex:1;

        display:flex;

        flex-direction:column;

    }

    #chat{

        flex:1;

        overflow-y:auto;

        white-space:pre-wrap;

        border:1px solid #dce2e8;

        border-radius:14px;

        background:white;

        padding:25px;

        font-size:15px;

        line-height:1.5;

    }


    /* ---------------- INPUT ---------------- */

    .input-row{

        margin-top:20px;

        display:flex;

        gap:10px;

    }

    #q{

        flex:1;

        padding:15px 18px;

        font-size:16px;

        border-radius:10px;

        border:1px solid #ccd3dc;

    }


    /* ---------------- BUTTONS ---------------- */

    button{

        padding:11px 20px;

        border:none;

        border-radius:9px;

        background:#1f5aa6;

        color:white;

        cursor:pointer;

        font-size:14px;

        font-weight:500;

    }

    button:hover{

        background:#174a87;

    }


    /* ---------------- LOGIN ---------------- */

    #loginScreen{

        width:360px;

        margin:120px auto;

        background:white;

        padding:40px;

        border-radius:12px;

        box-shadow:0 4px 15px rgba(0,0,0,.12);

    }

    #loginScreen h2{

        text-align:center;

        margin-top:0;

    }

    #password{

        width:100%;

        padding:12px;

        margin:20px 0;

    }

    #loginError{

        color:#d22;

        text-align:center;

    }


    /* ---------------- CHAT MESSAGES ---------------- */

    .message{

        display:flex;

        margin-bottom:18px;

    }

    .message.user{

        justify-content:flex-end;

    }

    .message.assistant{

        justify-content:flex-start;

    }

    .bubble{

        max-width:75%;

        padding:14px 18px;

        border-radius:16px;

        white-space:pre-wrap;

        word-break:break-word;

        line-height:1.5;

        font-size:15px;

    }

    .message.user .bubble{

        background:#1f5aa6;

        color:white;

        border-bottom-right-radius:4px;

    }

    .message.assistant .bubble{

        background:#eef2f7;

        color:#222;

        border-bottom-left-radius:4px;

        border:1px solid #d9dee5;

    }

    /* ---------------- MARKDOWN ---------------- */

    .bubble p{

        margin:0 0 12px 0;

    }

    .bubble p:last-child{

        margin-bottom:0;

    }

    .bubble h1,
    .bubble h2,
    .bubble h3,
    .bubble h4{

        margin:18px 0 10px 0;

        line-height:1.3;

    }

    .bubble h1:first-child,
    .bubble h2:first-child,
    .bubble h3:first-child,
    .bubble h4:first-child{

        margin-top:0;

    }

    .bubble ul,
    .bubble ol{

        margin:10px 0;

        padding-left:24px;

    }

    .bubble li{

        margin:6px 0;

    }

    .bubble code{

        background:#e6e9ee;

        padding:2px 5px;

        border-radius:4px;

        font-family:Consolas, monospace;

        font-size:90%;

    }

    .bubble pre{

        background:#1f2933;

        color:white;

        padding:14px;

        border-radius:8px;

        overflow-x:auto;

    }

    .bubble pre code{

        background:none;

        padding:0;

        color:inherit;

    }

    .bubble table{

        border-collapse:collapse;

        margin:14px 0;

        width:100%;

    }

    .bubble th,
    .bubble td{

        border:1px solid #cfd6df;

        padding:8px 10px;

        text-align:left;

    }

    .bubble th{

        background:#dde4ec;

    }

    .bubble blockquote{

        border-left:4px solid #1f5aa6;

        margin:12px 0;

        padding-left:12px;

        color:#555;

    }   

    @media(max-width:900px){

        .main-layout{

            flex-direction:column;

            height:auto;

        }


        .left-panel{

            width:100%;

        }


        .toolbar{

            flex-direction:column;

        }


        .toolbar select{

            width:100%;

        }

    }

    </style>


<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>

<body>

    <div id="loginScreen" style="display:none;">

        <h2>Internal Chatbot</h2>

        <input
            id="password"
            type="password"
            placeholder="Password">

        <button onclick="login()">
            Login
        </button>

        <p id="loginError"></p>

    </div>

    <div id="app" style="display:none;">

    <header class="header">

        <h1>Internal Manual Assistant</h1>

        <div class="header-buttons">

            <button onclick="clearChat()">
                New Chat
            </button>

            <button onclick="logout()">
                Logout
            </button>

        </div>

    </header>


    <div class="toolbar">

        <select id="areaSelect" onchange="updateMachines()"></select>

        <select id="machineSelect" onchange="updateVariants()"></select>

        <select id="variantSelect" onchange="switchManual()"></select>

    </div>


    <div class="main-layout">

        <div class="left-panel">

            <div class="card">

                <h3>Machine</h3>

                <img id="machineImage">

            </div>


            <div class="card">

                <h3>Documents</h3>

                <div id="documents"></div>

            </div>

        </div>


        <div class="chat-panel">

            <div id="chat"></div>

            <div class="input-row">

                <input
                    id="q"
                    placeholder="Ask a question about this machine...">

                <button onclick="ask()">
                    Send
                </button>

            </div>

        </div>

    </div>

    <script>
	const BACKEND_URL = "https://lehnerchatbotv02internal-production.up.railway.app";
    marked.setOptions({

        breaks:true

    });
        // ----------------------------
        // SESSION ID
        // ----------------------------
        let authToken =
            sessionStorage.getItem(
                "authToken"
            );

        let session_id = localStorage.getItem("session_id");

        if (!session_id) {
            session_id = crypto.randomUUID();
            localStorage.setItem("session_id", session_id);
        }

        const chatBox = document.getElementById("chat");

        let manualTree = {};


        // ----------------------------
        // ASK FUNCTION (STREAMING)
        // ----------------------------
        async function ask() {

            const area =
                document.getElementById("areaSelect").value;

            const machine =
                document.getElementById("machineSelect").value;

            const variant =
                document.getElementById("variantSelect").value;

            const manual =
                `${area}/${machine}/${variant}`;

            const q =
                document.getElementById("q").value.trim();

            if(!q){
                return;
            }

            // ----------------------------
            // USER MESSAGE
            // ----------------------------

            const userMessage =
                document.createElement("div");

            userMessage.className =
                "message user";

            const userBubble =
                document.createElement("div");

            userBubble.className =
                "bubble";

            userBubble.textContent = q;

            userMessage.appendChild(userBubble);

            chatBox.appendChild(userMessage);


            // ----------------------------
            // ASSISTANT MESSAGE
            // ----------------------------

            const botMessage =
                document.createElement("div");

            botMessage.className =
                "message assistant";

            const botBubble =
                document.createElement("div");

            botBubble.className =
                "bubble";

            botBubble.textContent =
                "Thinking...";

            botMessage.appendChild(
                botBubble
            );

            chatBox.appendChild(botMessage);

            chatBox.scrollTop =
                chatBox.scrollHeight;


            // ----------------------------
            // SEND REQUEST
            // ----------------------------

            const res = await fetch(
                `${BACKEND_URL}/ask`,
                {

                    method:"POST",

                    headers:{

                        "Content-Type":"application/json",

                        Authorization:`Bearer ${authToken}`

                    },

                    body:JSON.stringify({

                        question:q,

                        session_id:session_id,

                        manual:manual

                    })

                }
            );


            if(res.status===401){

                sessionStorage.removeItem(
                    "authToken"
                );

                location.reload();

                return;

            }


            const reader =
                res.body.getReader();

            const decoder =
                new TextDecoder("utf-8");

            let done = false;

            let firstChunk = true;

            let answer = "";

            while(!done){

                const {

                    value,

                    done:doneReading

                } = await reader.read();

                done = doneReading;

                if(value){

                    const chunk =
                        decoder.decode(value);

                    if(firstChunk){

                        botBubble.innerHTML = "";

                        firstChunk = false;

                    }

                    answer += chunk;

                    botBubble.innerHTML =
                        marked.parse(answer);

                    chatBox.scrollTop =
                        chatBox.scrollHeight;

                }

            }

            const input =
                document.getElementById("q");

            input.value = "";

            input.focus();

        }

        // ----------------------------
        // Load Manuals
        // ----------------------------

        async function loadManuals() {

            const res = await fetch(
                `${BACKEND_URL}/manuals`,
                {
                    headers: {
                        Authorization: `Bearer ${authToken}`
                    }
                }
            );

            if (res.status === 401) {

                sessionStorage.removeItem("authToken");

                location.reload();

                return;

            }



            manualTree = await res.json();

            const areaSelect = document.getElementById("areaSelect");

            areaSelect.innerHTML = "";

            for (const area in manualTree) {

                const option = document.createElement("option");

                option.value = area;
                option.textContent = area;

                areaSelect.appendChild(option);
            }

            updateMachines();
        }


        function updateMachines() {

            const area = document.getElementById("areaSelect").value;

            const machineSelect =
                document.getElementById("machineSelect");

            machineSelect.innerHTML = "";

            for (const machine in manualTree[area]) {

                const option = document.createElement("option");

                option.value = machine;
                option.textContent = machine;

                machineSelect.appendChild(option);
            }

            updateVariants();
        }

        function updateVariants() {

            const area =
                document.getElementById("areaSelect").value;

            const machine =
                document.getElementById("machineSelect").value;

            const variantSelect =
                document.getElementById("variantSelect");

            variantSelect.innerHTML = "";

            const variants = manualTree[area][machine];

            variants.forEach(variant => {

                const option = document.createElement("option");

                option.value = variant;
                option.textContent = variant;

                variantSelect.appendChild(option);
            });

            
            switchManual();
        }

        async function updateImage() {

            const area =
                document.getElementById("areaSelect").value;

            const machine =
                document.getElementById("machineSelect").value;

            const variant =
                document.getElementById("variantSelect").value;

            const response = await fetch(

                `${BACKEND_URL}/image/${area}/${machine}/${variant}`,

                {

                    headers:{

                        Authorization:`Bearer ${authToken}`

                    }

                }

            );

            if(response.status===401){

                sessionStorage.removeItem("authToken");

                location.reload();

                return;

            }

            const blob =
                await response.blob();

            const url =
                URL.createObjectURL(blob);

            document.getElementById(
                "machineImage"
            ).src = url;

        }


        // ----------------------------
        // Set up files for download
        // ----------------------------

        async function updateDocuments() {

            const area =
                document.getElementById("areaSelect").value;

            const machine =
                document.getElementById("machineSelect").value;

            const variant =
                document.getElementById("variantSelect").value;

            const res = await fetch(
                `${BACKEND_URL}/files/${area}/${machine}/${variant}`,
                {
                    headers:{
                        Authorization:`Bearer ${authToken}`
                    }
                }
            );

            if(res.status===401){

                sessionStorage.removeItem("authToken");

                location.reload();

                return;

            }

            const files = await res.json();

            const container =
                document.getElementById("documents");

            container.innerHTML = "";

            files.forEach(file => {

                const link = document.createElement("a");

                link.textContent = "📄 " + file;

                link.href = "#";


                link.onclick = async function(event){

                    event.preventDefault();


                    const response = await fetch(
                        `${BACKEND_URL}/download/${area}/${machine}/${variant}/${encodeURIComponent(file)}`,
                        {
                            headers:{
                                Authorization:`Bearer ${authToken}`
                            }
                        }
                    );


                    if(response.status === 401){

                        sessionStorage.removeItem(
                            "authToken"
                        );

                        location.reload();

                        return;

                    }


                    const blob = await response.blob();


                    const url = URL.createObjectURL(blob);


                    window.open(
                        url,
                        "_blank"
                    );

                };


                container.appendChild(link);


                container.appendChild(
                    document.createElement("br")
                );

            });
        }


        // ----------------------------
        // CLEAR CHAT
        // ----------------------------
        function clearChat() {

            session_id = crypto.randomUUID();

            localStorage.setItem(
                "session_id",
                session_id
            );

            chatBox.innerHTML = "";

            document.getElementById(
                "q"
            ).focus();

        }

        function logout(){

            sessionStorage.removeItem(
                "authToken"
            );

            authToken = null;

            location.reload();

        }

        function switchManual() {
            session_id = crypto.randomUUID();
            localStorage.setItem("session_id", session_id);

            chatBox.innerHTML = "";
            updateImage();
            updateDocuments();
            document.getElementById(
                "q"
            ).focus();            
        }

         

        // Enter to send
        document.getElementById("q").addEventListener("keydown", function(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault(); // prevent newline / form submit
                ask();
            }
        });


        async function login(){

            const password =
                document.getElementById(
                    "password"
                ).value;

            const response =
                await fetch(
                    `${BACKEND_URL}/login`,
                    {

                        method:"POST",

                        headers:{
                            "Content-Type":"application/json"
                        },

                        body:JSON.stringify({

                            password:password

                        })

                    }
                );

            if(!response.ok){

                document.getElementById(
                    "loginError"
                ).innerText =
                    "Wrong password";

                return;

            }

            const data =
                await response.json();

            authToken =
                data.token;

            sessionStorage.setItem(
                "authToken",
                authToken
            );

            showApp();

        }

        document.getElementById("password").addEventListener(
            "keydown",
            function(event){

                if(event.key === "Enter"){

                    event.preventDefault();

                    login();

                }

            }
        );



        async function verifyToken(){

            const response = await fetch(
                `${BACKEND_URL}/verify`,
                {
                    headers:{
                        Authorization:`Bearer ${authToken}`
                    }
                }
            );


            return response.ok;
        }



        function showApp(){

            document.getElementById(
                "loginScreen"
            ).style.display="none";


            document.getElementById(
                "app"
            ).style.display="block";


            loadManuals();

            document.getElementById(
                "q"
            ).focus();            

        }



        async function checkLogin(){

            if(!authToken){

                document.getElementById(
                    "loginScreen"
                ).style.display = "block";

                return;

            }

            const valid = await verifyToken();

            if(valid){

                showApp();

            }
            else{

                sessionStorage.removeItem(
                    "authToken"
                );

                authToken = null;

                document.getElementById(
                    "loginScreen"
                ).style.display = "block";

            }

        }



        checkLogin();
</script>

    </div>
</body>
</html>
